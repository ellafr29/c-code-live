<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belajar Algoritma C - Gamified</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #e2e8f0; }
    .font-mono-code { font-family: 'JetBrains Mono', monospace; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes checkmark { 0% { transform: scale(0) rotate(-45deg); } 50% { transform: scale(1.2); } 100% { transform: scale(1) rotate(0); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); } 50% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.8) rotateX(90deg); } 100% { opacity: 1; transform: scale(1) rotateX(0); } }
    @keyframes rainbow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(-100px) rotate(720deg); opacity: 0; } }
    @keyframes levelUp { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.3s ease-out; }
    .animate-slide-in-up { animation: slideInUp 0.5s ease-out; }
    .animate-pulse { animation: pulse 0.6s ease-in-out; }
    .animate-bounce { animation: bounce 0.6s ease-in-out; }
    .animate-checkmark { animation: checkmark 0.5s ease-out; }
    .animate-shake { animation: shake 0.4s ease-in-out; }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .animate-level-up { animation: levelUp 0.6s ease-out; }
    
    .xp-bar-fill { background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899, #f59e0b); background-size: 300% 100%; animation: rainbow 3s ease infinite; transition: width 0.5s ease-out; }
    
    /* Lesson Card Styles - PERBAIKAN UTAMA */
    .lesson-card {
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .lesson-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }
    .lesson-card.completed {
      border-color: #10b981 !important;
    }
    .lesson-card.completed::after {
      content: '✅';
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 1.5rem;
      animation: bounce 0.6s ease-in-out;
    }
    
    /* Achievement Badge Styles */
    .achievement-badge {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .achievement-badge:hover {
      transform: translateY(-5px) scale(1.05);
    }
    .achievement-badge.locked {
      filter: grayscale(100%) opacity(0.5);
    }
    .achievement-badge.unlocked {
      animation: glow 2s ease-in-out infinite;
    }
    
    /* Quiz Option Styles */
    .quiz-option {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .quiz-option:hover:not(.disabled) {
      transform: translateX(4px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }
    .quiz-option.selected {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-color: #7c3aed;
      transform: scale(1.02);
    }
    .quiz-option.correct {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-color: #10b981;
      animation: popIn 0.4s ease-out;
    }
    .quiz-option.incorrect {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      border-color: #ef4444;
      animation: shake 0.3s ease-in-out;
    }
    .quiz-option.disabled {
      pointer-events: none;
      opacity: 0.7;
    }
    
    /* Daily Challenge Card */
    .daily-challenge-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .daily-challenge-card:hover {
      transform: translateY(-2px);
    }
    .daily-challenge-card.completed {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2));
      border-color: rgba(16, 185, 129, 0.4);
    }
    
    /* Code Editor */
    .code-editor {
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d3f 100%);
      border: 1px solid #3d3d5c;
    }
    
    /* Confetti */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      animation: confetti 3s ease-out forwards;
    }
    
    /* XP Popup */
    .xp-popup {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      animation: floatUp 1s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-50px); }
    }
    
    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    /* Progress Bar */
    .progress-bar {
      transition: width 0.5s ease-out;
    }
    
    /* Button hover effects */
    .btn-primary {
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
    
    /* Section card */
    .section-card {
      transition: all 0.3s ease;
    }
    .section-card:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="h-full bg-slate-900 text-slate-100 overflow-auto">
  <div id="app" class="h-full w-full flex flex-col">
   <!-- Confetti Container -->
   <div id="confetti-container" class="confetti-container"></div>
   
   <!-- XP Popup Container -->
   <div id="xp-popup-container"></div>
   
   <!-- Header -->
   <header class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4 shadow-lg sticky top-0 z-40">
    <div class="max-w-7xl mx-auto">
     <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-3">
       <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center animate-bounce cursor-pointer hover:bg-white/30 transition-colors" onclick="showProfile()">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
       </div>
       <div>
        <h1 class="text-xl font-bold text-white">Belajar Algoritma C</h1>
        <p id="user-welcome" class="text-indigo-200 text-sm">Selamat datang, Pembelajar!</p>
       </div>
      </div>
      
      <div class="flex items-center gap-4">
       <!-- Streak -->
       <div class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-xl cursor-pointer hover:bg-white/20 transition-all" onclick="showDailyChallenges()">
        <span class="text-2xl animate-pulse">🔥</span>
        <div>
         <p id="streak-count" class="text-white font-bold text-lg">0</p>
         <p class="text-indigo-200 text-xs">Hari Streak</p>
        </div>
       </div>
       
       <!-- Level -->
       <div class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-xl cursor-pointer hover:bg-white/20 transition-all" onclick="showLeaderboard()">
        <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
         <span id="level-number" class="text-2xl font-bold text-white">1</span>
        </div>
        <div class="text-left">
         <p class="text-indigo-200 text-xs">Level</p>
         <p id="level-title" class="text-white font-bold">Pemula</p>
        </div>
       </div>
       
       <!-- XP -->
       <div class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-xl cursor-pointer hover:bg-white/20 transition-all" onclick="showAchievements()">
        <span class="text-2xl">⭐</span>
        <div>
         <p id="xp-points" class="text-white font-bold text-lg">0</p>
         <p class="text-indigo-200 text-xs">Total XP</p>
        </div>
       </div>
      </div>
     </div>
     
     <!-- XP Progress Bar -->
     <div class="h-6 bg-slate-800 rounded-xl overflow-hidden relative border-2 border-indigo-500">
      <div id="xp-bar-fill" class="xp-bar-fill h-full" style="width: 0%"></div>
      <div class="absolute inset-0 flex items-center justify-center">
       <span id="xp-progress-text" class="text-white text-xs font-bold">0 / 100 XP ke Level 2</span>
      </div>
     </div>
    </div>
   </header>
   
   <main class="flex-1 overflow-auto">
    <div class="max-w-7xl mx-auto p-6">
     
     <!-- Profile Modal -->
     <div id="profile-modal" class="hidden" style="position: fixed; inset: 0; z-index: 50;">
      <div class="modal-overlay" onclick="closeProfile()"></div>
      <div class="bg-slate-800 rounded-2xl p-6 max-w-md w-full relative animate-pop-in z-10" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
       <button onclick="closeProfile()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl">✕</button>
       <div class="text-center mb-6">
        <div class="w-24 h-24 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full mx-auto mb-4 flex items-center justify-center">
         <span id="profile-level" class="text-4xl font-bold text-white">1</span>
        </div>
        <h2 id="profile-name" class="text-2xl font-bold text-white">Pembelajar C</h2>
        <p id="profile-title" class="text-indigo-300">Pemula</p>
       </div>
       
       <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-slate-700/50 rounded-xl p-4 text-center">
         <p class="text-3xl font-bold text-yellow-400" id="profile-xp">0</p>
         <p class="text-slate-400 text-xs">Total XP</p>
        </div>
        <div class="bg-slate-700/50 rounded-xl p-4 text-center">
         <p class="text-3xl font-bold text-orange-400" id="profile-streak">0</p>
         <p class="text-slate-400 text-xs">Streak Hari</p>
        </div>
        <div class="bg-slate-700/50 rounded-xl p-4 text-center">
         <p class="text-3xl font-bold text-green-400" id="profile-lessons">0</p>
         <p class="text-slate-400 text-xs">Topik Selesai</p>
        </div>
       </div>
       
       <div class="bg-slate-700/50 rounded-xl p-4">
        <h3 class="font-bold text-white mb-3">📊 Statistik</h3>
        <div class="space-y-2 text-sm">
         <div class="flex justify-between"><span class="text-slate-400">Kuis Selesai</span><span id="profile-quizzes" class="text-white font-bold">0</span></div>
         <div class="flex justify-between"><span class="text-slate-400">Rata-rata Skor</span><span id="profile-avg-score" class="text-white font-bold">0%</span></div>
         <div class="flex justify-between"><span class="text-slate-400">Tantangan</span><span id="profile-challenges" class="text-white font-bold">0</span></div>
         <div class="flex justify-between"><span class="text-slate-400">Achievements</span><span id="profile-achievements" class="text-white font-bold">0/0</span></div>
        </div>
       </div>
